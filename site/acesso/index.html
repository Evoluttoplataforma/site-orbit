<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Orbit Gestão</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ffba1a;
            --primary-dark: #E5A235;
            --black: #000000;
            --black-soft: #111111;
            --white: #FFFFFF;
            --gray-100: #F5F5F5;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --error: #EF4444;
            --success: #22C55E;
            --radius: 16px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-bg {
            position: absolute; inset: 0; pointer-events: none;
        }
        .login-bg__glow {
            position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.12;
            background: var(--primary);
        }
        .login-bg__glow--1 { width: 500px; height: 500px; top: -150px; right: -100px; }
        .login-bg__glow--2 { width: 400px; height: 400px; bottom: -100px; left: -80px; }

        .login-card {
            background: var(--black-soft);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img { height: 40px; }
        .login-logo p {
            color: var(--gray-500);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }
        .password-toggle:hover { color: var(--primary); }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--black);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--error);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .login-footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-card { margin: 20px; padding: 32px 24px; }
        }
    </style>
</head>
<script>window.switchLang=function(){var l=localStorage.getItem("orbit_lang")||"pt";localStorage.setItem("orbit_lang",l==="pt"?"en":"pt");window.location.reload();};</script>
<script src="/js/translations/common.js"></script>
<script src="/js/i18n.js"></script>
<body>
    <div class="login-bg">
        <div class="login-bg__glow login-bg__glow--1"></div>
        <div class="login-bg__glow login-bg__glow--2"></div>
    </div>

    <div class="login-card">
        <div class="login-logo">
            <img src="/images/logo-orbit-white.png" alt="Orbit Gestão">
            <p>Painel de Conteudo</p>
        </div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                Entrar
            </button>
        </form>

        <div class="login-footer">
            <a href="/"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
        </div>
    </div>

    <script>
    // ── Orbit CMS Auth ──
    const ORBIT_STORAGE_KEY = 'orbit_cms';

    function getDB() {
        try {
            return JSON.parse(localStorage.getItem(ORBIT_STORAGE_KEY)) || null;
        } catch { return null; }
    }

    function setDB(data) {
        localStorage.setItem(ORBIT_STORAGE_KEY, JSON.stringify(data));
    }

    // Hash password with SHA-256
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password + '_orbit_salt_2024');
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Initialize DB with default admin
    async function initDB() {
        let db = getDB();
        if (!db) {
            const adminHash = await hashPassword('orbit@2024');
            db = {
                users: [
                    {
                        id: 'usr_' + Date.now(),
                        email: 'rodrigoosouzaamarketing@gmail.com',
                        name: 'Rodrigo Souza',
                        password: adminHash,
                        role: 'admin',
                        createdAt: new Date().toISOString(),
                        active: true
                    }
                ],
                articles: [],
                version: 1
            };
            setDB(db);
        }
        return db;
    }

    // Check if already logged in
    function getSession() {
        try {
            return JSON.parse(sessionStorage.getItem('orbit_session')) || null;
        } catch { return null; }
    }

    // Redirect if already logged in
    const session = getSession();
    if (session) {
        window.location.href = '/acesso/painel';
    }

    // Toggle password visibility
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('btnLogin');
        errorEl.style.display = 'none';

        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            errorEl.textContent = 'Preencha todos os campos.';
            errorEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
            const db = await initDB();
            const hash = await hashPassword(password);
            const user = db.users.find(u => u.email === email && u.password === hash && u.active);

            if (!user) {
                errorEl.textContent = 'E-mail ou senha incorretos.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Entrar';
                return;
            }

            // Save session
            sessionStorage.setItem('orbit_session', JSON.stringify({
                id: user.id,
                email: user.email,
                name: user.name,
                role: user.role,
                loginAt: new Date().toISOString()
            }));

            window.location.href = '/acesso/painel';
        } catch (err) {
            errorEl.textContent = 'Erro ao fazer login. Tente novamente.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    });

    // Init DB on load
    initDB();
    </script>
</body>
</html>
